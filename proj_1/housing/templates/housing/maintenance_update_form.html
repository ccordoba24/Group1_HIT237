{% extends "housing/base.html" %}

{% block title %}Add Maintenance Update — NT Housing Maintenance{% endblock %}

{% block content %}
<div class="container container--narrow">
    <div class="page-card form-card">
        <h1>Add Maintenance Update</h1>
        <p class="page-intro">Record progress or notes for this repair request.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="actions">
                <button type="submit" class="btn btn-primary">Save Update</button>
                <a href="{% url 'repair-request-detail' view.kwargs.pk %}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
