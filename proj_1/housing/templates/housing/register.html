{% extends "housing/base.html" %}

{% block content %}
    <div class="container">
        <h2>Create an account</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit">Register</button>
        </form>

        <p>
            After registration, you will be redirected to the dashboard.
        </p>
    </div>
{% endblock %}
