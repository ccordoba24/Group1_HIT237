<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>NT Housing Maintenance System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
        }

        .header {
            background: #2c3e50;
            color: #fff;
            padding: 12px 24px;
            display: flex;
            align-items: center;
        }

        .brand {
            font-size: 18px;
            font-weight: 600;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .nav {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            padding: 6px 8px;
        }

        .nav span {
            color: #fff;
            padding: 6px 8px;
        }

        .logout-form {
            display: inline;
            margin: 0;
        }

        .logout-button {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font: inherit;
            padding: 6px 8px;
        }

        .logout-button:hover,
        .nav a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-inner">
            <div class="brand">NT Housing Maintenance System</div>

            <nav class="nav">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'repair-request-list' %}">Requests</a>
                <a href="{% url 'faq' %}">FAQ</a>
                <a href="{% url 'about' %}">About</a>

                {% if user.is_authenticated %}
                    <span>Logged in as {{ user.username }}</span>

                    <form method="post" action="{% url 'logout' %}" class="logout-form">
                        {% csrf_token %}
                        <button type="submit" class="logout-button">
                            Logout
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'register' %}">Register</a>
                    <a href="{% url 'login' %}">Login</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

</body>
</html>
